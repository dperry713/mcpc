apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "background-job.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "background-job.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "background-job.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "background-job.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
